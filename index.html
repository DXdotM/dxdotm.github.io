<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BriefingDE – Dein deutsches Nachrichten-Briefing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0d0d0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      max-width: 480px;
      text-align: center;
    }

    .app-icon {
      width: 128px;
      height: 128px;
      border-radius: 28px;
      object-fit: cover;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
    }

    .app-icon-placeholder {
      width: 128px;
      height: 128px;
      border-radius: 28px;
      background: linear-gradient(135deg, #1c1c2e, #2d2d44);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .app-icon-placeholder svg {
      width: 56px;
      height: 56px;
      opacity: 0.6;
    }

    .badge {
      display: inline-block;
      background: rgba(255, 59, 48, 0.15);
      color: #ff6b60;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 59, 48, 0.3);
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #ffffff;
      line-height: 1.1;
    }

    .tagline {
      font-size: 1.05rem;
      color: #8e8ea0;
      line-height: 1.6;
      max-width: 360px;
    }

    .appstore-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      background: #ffffff;
      color: #0d0d0f;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.75rem 1.75rem;
      border-radius: 14px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .appstore-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .appstore-btn svg {
      width: 20px;
      height: 20px;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.75rem;
      color: #3a3a4a;
      text-align: center;
    }

    footer a {
      color: #3a3a4a;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="hero">

    <img
      src="App_Icon.png"
      alt="BriefingDE App Icon"
      class="app-icon"
      onerror="this.style.display='none'; document.getElementById('icon-fallback').style.display='flex';"
    />
    <div id="icon-fallback" class="app-icon-placeholder" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6h16M4 10h16M4 14h10M4 18h8" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <span class="badge">Nachrichten · KI-Zusammenfassungen</span>

    <h1>BriefingDE</h1>

    <p class="tagline">
      Aktuelle deutsche Nachrichten – kompakt und klar zusammengefasst. Immer informiert, ohne den Lärm.
    </p>

    <a href="https://apps.apple.com/de/app/briefingde/id6759226783?l=en-GB" class="appstore-btn" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Im App Store laden
    </a>

  </div>

  <footer>
    <p>&copy; 2026 BriefingDE &nbsp;·&nbsp; <a href="impressum.html">Impressum</a> &nbsp;·&nbsp; <a href="datenschutz.html">Datenschutz</a></p>
  </footer>

</body>
</html>
